<html lang="en">

<title>The Kitchen</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Sacramento&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&display=swap');

  :root {
    --cream: #f5ebd8;
    --paper: #fcf6ea;
    --paper-edge: #e8d8c0;
    --paper-shadow: rgba(93, 74, 58, 0.1);
    --peach: #e8a892;
    --peach-deep: #c97a5f;
    --peach-soft: #f5d4c4;
    --sage: #a8c098;
    --sage-deep: #7a9670;
    --sage-soft: #d8e3cc;
    --brown: #5d4a3a;
    --brown-soft: #8b7560;
    --brown-faint: #b8a692;
    --gold: #d4a849;
    --gold-soft: #ecd49a;
    --copper: #b8865c;
    --pink: #f0d5cc;
    --line: rgba(93, 74, 58, 0.15);
    --line-soft: rgba(93, 74, 58, 0.08);
    --notebook-line: rgba(180, 140, 100, 0.18);
    --shadow-sm: 0 1px 3px rgba(93, 74, 58, 0.1);
    --shadow-md: 0 4px 12px rgba(93, 74, 58, 0.12);
    --shadow-lg: 0 12px 40px rgba(93, 74, 58, 0.18);
    --script: 'Sacramento', cursive;
    --hand: 'Caveat', cursive;
    --hand-clean: 'Patrick Hand', cursive;
    --sans: 'Quicksand', -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--cream);
    font-family: var(--sans);
    color: var(--brown);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Subtle paper texture across whole bg */
  body {
    background-image:
      radial-gradient(at 10% 0%, rgba(232, 168, 146, 0.08) 0%, transparent 60%),
      radial-gradient(at 90% 100%, rgba(168, 192, 152, 0.06) 0%, transparent 50%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.36 0 0 0 0 0.29 0 0 0 0 0.23 0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  #app { max-width: 1400px; margin: 0 auto; padding: 24px 32px 80px; }

  /* ================ Header ================ */
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 14px 32px; margin-bottom: 32px; position: relative;
    background: var(--paper);
    border-radius: 18px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--paper-edge);
  }
  header::before {
    /* spiral binding decoration on left edge */
    content: ''; position: absolute; left: 6px; top: 12px; bottom: 12px;
    width: 14px;
    background-image: radial-gradient(circle, var(--copper) 38%, transparent 42%);
    background-size: 14px 18px;
    background-repeat: repeat-y;
    opacity: 0.35;
  }
  .brand { display: flex; align-items: center; gap: 12px; padding-left: 14px; }
  .brand-mark {
    width: 44px; height: 44px; background: var(--peach); border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--paper); font-family: var(--script); font-weight: 400; font-size: 32px;
    box-shadow: 0 2px 8px rgba(201, 122, 95, 0.3);
  }
  .brand-name {
    font-family: var(--script); font-weight: 400; font-size: 38px; line-height: 1;
    color: var(--brown); padding-bottom: 4px;
  }
  .brand-sub {
    font-family: var(--hand); font-size: 18px; color: var(--brown-soft);
    margin-top: -4px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ================ Buttons ================ */
  .btn {
    background: transparent; border: 1.5px solid var(--brown-faint); color: var(--brown);
    padding: 9px 18px; border-radius: 999px; font-family: var(--sans); font-weight: 600;
    font-size: 14px; cursor: pointer; transition: all 0.15s; min-height: 44px;
    display: inline-flex; align-items: center; gap: 8px; touch-action: manipulation;
  }
  .btn:hover, .btn:active { background: var(--peach-soft); border-color: var(--peach-deep); color: var(--peach-deep); }
  .btn-primary { background: var(--peach); color: var(--paper); border-color: var(--peach); font-weight: 700; }
  .btn-primary:hover, .btn-primary:active { background: var(--peach-deep); border-color: var(--peach-deep); color: var(--paper); }
  .btn-sage { background: var(--sage); color: var(--paper); border-color: var(--sage); }
  .btn-sage:hover, .btn-sage:active { background: var(--sage-deep); border-color: var(--sage-deep); color: var(--paper); }
  .btn-ghost { border-color: transparent; }
  .btn-icon { width: 44px; padding: 0; justify-content: center; font-size: 16px; }

  /* ================ Today hero card (open recipe page) ================ */
  .today-card {
    background: var(--paper);
    border-radius: 20px; overflow: hidden;
    margin-bottom: 40px; box-shadow: var(--shadow-md);
    border: 1px solid var(--paper-edge);
    position: relative;
  }
  .today-card::before {
    /* spiral binding down the left */
    content: ''; position: absolute; left: 8px; top: 20px; bottom: 20px;
    width: 14px;
    background-image: radial-gradient(circle, var(--copper) 35%, transparent 40%);
    background-size: 14px 22px;
    background-repeat: repeat-y;
    opacity: 0.4;
  }
  .today-card-inner { display: grid; grid-template-columns: 320px 1fr; gap: 0; padding-left: 32px; }
  .today-image-wrap { padding: 28px 0 28px 12px; }
  .today-image {
    background: var(--peach-soft); background-size: cover; background-position: center;
    aspect-ratio: 1; border-radius: 14px; box-shadow: 0 4px 12px var(--paper-shadow);
    border: 4px solid var(--paper);
  }
  .today-image-empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--brown-faint); font-family: var(--hand); font-size: 22px;
  }
  .today-body { padding: 28px 32px 28px 28px; display: flex; flex-direction: column; justify-content: center; }
  .today-tag {
    font-family: var(--hand); color: var(--peach-deep);
    font-size: 20px; margin-bottom: 4px; letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .today-title {
    font-family: var(--script); font-weight: 400; font-size: 52px; line-height: 1;
    color: var(--brown); margin-bottom: 14px; padding-bottom: 4px;
  }
  .today-desc {
    font-family: var(--hand); color: var(--brown-soft); font-size: 18px;
    line-height: 1.4; margin-bottom: 16px; max-width: 540px;
  }
  .today-meta-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .meta-pill {
    background: var(--peach-soft); border: 1.5px solid var(--peach);
    padding: 8px 16px; border-radius: 12px; display: inline-flex; align-items: center; gap: 8px;
    min-width: 90px;
  }
  .meta-pill .meta-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--peach-deep); font-weight: 700;
  }
  .meta-pill .meta-value {
    font-family: var(--hand); font-size: 18px; font-weight: 600; color: var(--brown);
    line-height: 1;
  }
  .today-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .today-empty {
    padding: 56px 36px 56px 32px; text-align: center;
  }
  .today-empty .today-title { font-size: 42px; margin-bottom: 4px; }

  /* ================ Section labels ================ */
  .section-head {
    display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px;
    padding: 0 8px;
  }
  .section-head h2 {
    font-family: var(--script); font-weight: 400; font-size: 36px; color: var(--brown);
    line-height: 1;
  }
  .section-head .sub {
    font-family: var(--hand); font-size: 18px; color: var(--brown-soft);
  }
  .week-nav { display: flex; gap: 6px; margin-left: auto; }

  /* ================ Week grid (notebook pages) ================ */
  .week-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin-bottom: 48px;
  }
  .day-card {
    background: var(--paper); border: 1px solid var(--paper-edge); border-radius: 14px;
    overflow: hidden; transition: all 0.2s; min-height: 240px;
    display: flex; flex-direction: column; position: relative;
    box-shadow: var(--shadow-sm);
  }
  .day-card.is-today {
    border: 2px solid var(--peach); box-shadow: 0 4px 16px rgba(232, 168, 146, 0.3);
  }
  .day-card.is-today::after {
    content: '★ Today'; position: absolute; top: -1px; right: 10px;
    background: var(--peach); color: var(--paper); padding: 3px 10px;
    border-radius: 0 0 8px 8px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 700; z-index: 2;
  }
  .day-header {
    padding: 12px 14px 6px; text-align: center;
    border-bottom: 1px dashed var(--line);
  }
  .day-name {
    font-family: var(--hand); font-weight: 600; font-size: 16px;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--peach-deep);
  }
  .day-date {
    font-family: var(--script); font-weight: 400; font-size: 32px; line-height: 1;
    color: var(--brown);
  }
  .meal-slot {
    flex: 1; padding: 10px 12px; cursor: pointer;
    display: flex; flex-direction: column;
    border-bottom: 1px dashed var(--line);
    transition: background 0.15s;
  }
  .meal-slot:last-child { border-bottom: none; }
  .meal-slot:hover { background: rgba(232, 168, 146, 0.08); }
  .meal-slot-label {
    font-family: var(--hand); font-size: 13px; color: var(--brown-soft);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
    margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
  }
  .meal-slot-label::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
  }
  .meal-slot-lunch .meal-slot-label::before { background: var(--sage); }
  .meal-slot-dinner .meal-slot-label::before { background: var(--peach); }
  .meal-slot-img {
    height: 56px; background-size: cover; background-position: center;
    border-radius: 6px; margin-bottom: 6px; background-color: var(--peach-soft);
  }
  .meal-slot-name {
    font-family: var(--hand); font-weight: 500; font-size: 15px; line-height: 1.2;
    color: var(--brown); flex: 1;
  }
  .meal-slot-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--brown-faint); font-family: var(--hand); font-size: 22px;
  }

  /* ================ Modal ================ */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(93, 74, 58, 0.4);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 24px; overflow-y: auto;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal {
    background: var(--paper); border-radius: 24px; max-width: 1100px; width: 100%;
    margin: 24px auto; overflow: hidden; box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s ease; position: relative;
    border: 1px solid var(--paper-edge);
  }
  .modal::before {
    /* spiral binding */
    content: ''; position: absolute; left: 8px; top: 20px; bottom: 20px;
    width: 14px;
    background-image: radial-gradient(circle, var(--copper) 35%, transparent 40%);
    background-size: 14px 22px;
    background-repeat: repeat-y;
    opacity: 0.4; z-index: 1;
  }
  .modal-close {
    position: absolute; top: 18px; right: 18px; z-index: 5;
    background: var(--paper); border: 1.5px solid var(--paper-edge);
    width: 44px; height: 44px; border-radius: 50%;
    cursor: pointer; font-size: 18px; color: var(--brown); box-shadow: var(--shadow-sm);
    display: flex; align-items: center; justify-content: center;
  }

  /* ================ Recipe view (open notebook spread) ================ */
  .recipe-page {
    padding: 36px 36px 36px 60px; position: relative;
  }
  .recipe-page-title {
    text-align: center; margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 2px dashed var(--line);
  }
  .recipe-page-title .recipe-day-tag {
    font-family: var(--hand); font-size: 18px; color: var(--peach-deep);
    margin-bottom: 0px; display: block;
  }
  .recipe-page-title h1 {
    font-family: var(--script); font-weight: 400; font-size: 60px; line-height: 1;
    color: var(--brown);
  }

  .recipe-top-row {
    display: grid; grid-template-columns: 280px 1fr; gap: 32px; margin-bottom: 28px;
  }
  .recipe-photo {
    aspect-ratio: 1; background-size: cover; background-position: center;
    background-color: var(--peach-soft); border-radius: 12px; box-shadow: 0 4px 14px var(--paper-shadow);
    border: 4px solid var(--paper); position: relative;
  }
  .recipe-photo-empty {
    display: flex; align-items: center; justify-content: center;
    font-family: var(--hand); color: var(--brown-faint); font-size: 22px;
  }
  .recipe-stats { display: flex; flex-direction: column; gap: 12px; }
  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-box {
    background: var(--peach-soft); border: 2px solid var(--peach);
    padding: 10px 18px; border-radius: 14px; flex: 1; min-width: 110px;
    text-align: center;
  }
  .stat-box .stat-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--peach-deep); font-weight: 700; display: block; margin-bottom: 2px;
  }
  .stat-box .stat-value {
    font-family: var(--hand); font-size: 22px; font-weight: 600; color: var(--brown);
    line-height: 1;
  }
  .recipe-desc {
    font-family: var(--hand); font-size: 19px; line-height: 1.4;
    color: var(--brown-soft); padding: 8px 0;
  }

  .recipe-cols {
    display: grid; grid-template-columns: 1fr 1px 1.6fr; gap: 32px; padding-top: 8px;
  }
  .recipe-divider {
    background: var(--line); width: 1px;
    background-image: linear-gradient(to bottom, transparent, var(--line) 20%, var(--line) 80%, transparent);
  }
  .recipe-section-h {
    font-family: var(--script); font-weight: 400; font-size: 32px;
    color: var(--peach-deep); margin-bottom: 12px; line-height: 1;
  }
  .ingredient-list { list-style: none; }
  .ingredient {
    display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
    cursor: pointer; font-family: var(--hand-clean); font-size: 17px;
    line-height: 1.4; min-height: 32px;
    border-bottom: 1px solid var(--notebook-line);
  }
  .ingredient input[type="checkbox"] {
    width: 18px; height: 18px; margin-top: 4px; accent-color: var(--peach-deep);
    flex-shrink: 0; cursor: pointer;
  }
  .ingredient.checked { color: var(--brown-faint); text-decoration: line-through; }

  .step-list { counter-reset: step; }
  .step {
    display: flex; gap: 12px; padding: 10px 0;
    font-family: var(--hand-clean); font-size: 17px; line-height: 1.5;
    border-bottom: 1px solid var(--notebook-line);
    align-items: flex-start;
  }
  .step-num {
    font-family: var(--hand); font-weight: 700; font-size: 22px; color: var(--peach-deep);
    line-height: 1.2; min-width: 28px; flex-shrink: 0;
  }
  .step-text { padding-top: 2px; flex: 1; color: var(--brown); }

  /* Cook mode = bigger everything */
  .modal.cook-mode .recipe-page { padding: 48px 60px 60px 80px; }
  .modal.cook-mode .recipe-page-title h1 { font-size: 50px; }
  .modal.cook-mode .ingredient { font-size: 22px; padding: 10px 0; min-height: 44px; }
  .modal.cook-mode .ingredient input[type="checkbox"] { width: 24px; height: 24px; }
  .modal.cook-mode .step { font-size: 22px; padding: 16px 0; }
  .modal.cook-mode .step-num { font-size: 28px; }
  .modal.cook-mode .recipe-cols { grid-template-columns: 1fr 1px 1.5fr; gap: 40px; }

  .recipe-actions {
    display: flex; gap: 10px; margin-top: 32px; padding-top: 24px;
    border-top: 2px dashed var(--line); flex-wrap: wrap; align-items: center;
  }
  .recipe-actions a {
    color: var(--brown-soft); text-decoration: none; padding: 10px 18px;
    border: 1.5px solid var(--brown-faint); border-radius: 999px; font-size: 14px;
    display: inline-flex; align-items: center; gap: 8px; min-height: 44px; font-family: var(--sans); font-weight: 600;
  }
  .btn-danger { border-color: rgba(201, 122, 95, 0.4); color: var(--peach-deep); }

  /* ================ Add recipe panel ================ */
  .add-panel { padding: 40px 40px 40px 60px; text-align: center; }
  .add-panel h2 {
    font-family: var(--script); font-weight: 400; font-size: 48px; line-height: 1;
    color: var(--brown); margin-bottom: 4px;
  }
  .add-panel .subtitle {
    color: var(--brown-soft); margin-bottom: 24px; font-size: 17px; font-family: var(--hand);
  }
  .meal-slot-picker {
    display: inline-flex; gap: 4px; padding: 4px; background: var(--cream);
    border-radius: 999px; margin-bottom: 24px;
  }
  .slot-pill {
    padding: 8px 20px; border-radius: 999px; cursor: pointer;
    font-family: var(--sans); font-weight: 600; font-size: 14px; color: var(--brown-soft);
    transition: all 0.15s; border: none; background: transparent;
  }
  .slot-pill.active { background: var(--peach); color: var(--paper); }

  .url-input-wrap { display: flex; gap: 8px; max-width: 600px; margin: 0 auto 12px; }
  .url-input {
    flex: 1; padding: 14px 18px; border: 1.5px solid var(--brown-faint);
    border-radius: 999px; font-family: var(--sans); font-size: 15px;
    background: var(--paper); color: var(--brown); min-height: 48px;
  }
  .url-input:focus { outline: 2px solid var(--peach); outline-offset: -1px; border-color: transparent; }

  .add-divider {
    margin: 28px auto 20px; max-width: 400px; display: flex; align-items: center;
    gap: 16px; color: var(--brown-faint); font-family: var(--hand); font-size: 16px;
  }
  .add-divider::before, .add-divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .library-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px; max-width: 800px; margin: 0 auto;
  }
  .library-item {
    background: var(--paper); border: 1.5px solid var(--paper-edge); border-radius: 14px;
    padding: 10px; cursor: pointer; text-align: left; transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .library-item:hover { border-color: var(--peach); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .library-img {
    width: 100%; height: 80px; background: var(--peach-soft); border-radius: 8px;
    background-size: cover; background-position: center; margin-bottom: 8px;
  }
  .library-name {
    font-family: var(--hand); font-weight: 600; font-size: 17px; line-height: 1.2; color: var(--brown);
  }
  .library-empty {
    color: var(--brown-faint); font-family: var(--hand); padding: 16px; font-size: 18px;
  }

  /* ================ Loading ================ */
  .loader {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--line); border-top-color: var(--peach);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state { text-align: center; padding: 64px 24px; }
  .loading-state .loader { width: 36px; height: 36px; border-width: 3px; margin-bottom: 16px; }
  .loading-state-text { font-family: var(--hand); color: var(--brown-soft); font-size: 22px; }
  .loading-sub { font-family: var(--sans); color: var(--brown-faint); font-size: 13px; margin-top: 6px; }

  /* ================ Manual / edit form ================ */
  .manual-form { max-width: 640px; margin: 0 auto; text-align: left; }
  .manual-form label {
    display: block; font-family: var(--hand); font-size: 16px;
    color: var(--peach-deep); margin-bottom: 4px; margin-top: 14px; font-weight: 600;
  }
  .manual-form input, .manual-form textarea {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--brown-faint);
    border-radius: 10px; font-family: var(--hand-clean); font-size: 16px;
    background: var(--paper); color: var(--brown); resize: vertical;
  }
  .manual-form input:focus, .manual-form textarea:focus {
    outline: 2px solid var(--peach); outline-offset: -1px; border-color: transparent;

</style>

<body>
<div id="app"></div>

<script>
// ===================== Storage =====================
const Store = {
  get(k) { return localStorage.getItem(k); },
  set(k, v) { localStorage.setItem(k, v); },
  del(k) { localStorage.removeItem(k); },
  keys(prefix) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (!prefix || k.startsWith(prefix))) out.push(k);
    }
    return out;
  }
};

// ===================== State =====================
const state = {
  weekOffset: 0,
  meals: {},      // key: "YYYY-MM-DD:lunch" or "YYYY-MM-DD:dinner"
  library: [],
  modal: null,    // { type, date?, slot?, cookMode?, recipe? }
  loading: false,
  loadingMsg: '',
  error: null,
  manualMode: false,
  apiKey: '',
};

function loadState() {
  for (const k of Store.keys('meal:')) {
    try { state.meals[k.replace('meal:', '')] = JSON.parse(Store.get(k)); } catch (e) {}
  }
  try { state.library = JSON.parse(Store.get('library') || '[]'); } catch (e) { state.library = []; }
  state.apiKey = Store.get('apiKey') || '';
}

function mealKey(date, slot) { return `${date}:${slot}`; }

function saveMeal(date, slot, recipe) {
  const k = mealKey(date, slot);
  state.meals[k] = recipe;
  Store.set('meal:' + k, JSON.stringify(recipe));
  // Add to library
  if (recipe && recipe.title && !state.library.find(r => r.title === recipe.title)) {
    state.library.unshift(recipe);
    if (state.library.length > 60) state.library = state.library.slice(0, 60);
    Store.set('library', JSON.stringify(state.library));
  }
}

function updateMeal(date, slot, recipe) {
  // Update existing meal AND update library entry if matching title
  const k = mealKey(date, slot);
  state.meals[k] = recipe;
  Store.set('meal:' + k, JSON.stringify(recipe));
  const idx = state.library.findIndex(r => r.title === recipe.title);
  if (idx >= 0) {
    state.library[idx] = recipe;
    Store.set('library', JSON.stringify(state.library));
  }
}

function removeMeal(date, slot) {
  const k = mealKey(date, slot);
  delete state.meals[k];
  Store.del('meal:' + k);
}

function setApiKey(key) {
  state.apiKey = key.trim();
  if (state.apiKey) Store.set('apiKey', state.apiKey);
  else Store.del('apiKey');
}

// ===================== Date =====================
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function startOfWeek(date) {
  const d = new Date(date); d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}
function getWeekDays(offset = 0) {
  const start = startOfWeek(new Date());
  start.setDate(start.getDate() + offset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start); d.setDate(d.getDate() + i); return d;
  });
}
function fmtDay(d) { return d.toLocaleDateString('en-US', { weekday: 'short' }); }
function fmtFullDay(d) { return d.toLocaleDateString('en-US', { weekday: 'long' }); }
function fmtMonthDay(d) { return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' }); }

// ===================== Recipe parsing (CORS proxy + JSON-LD) =====================
async function fetchRecipeHtml(url) {
  if (/pinterest\.[a-z.]+\/pin\//i.test(url)) {
    throw new Error("Pinterest pin links don't contain the recipe — open the pin and paste the original site URL it links to.");
  }
  const proxies = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  ];
  for (const make of proxies) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(make(url), { signal: ctrl.signal });
      clearTimeout(t);
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 500) return text;
      }
    } catch (e) {}
  }
  throw new Error("Couldn't reach the recipe page. Check your connection or enter it by hand.");
}

function extractRecipeFromHtml(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const ldScripts = doc.querySelectorAll('script[type="application/ld+json"]');
  for (const script of ldScripts) {
    try {
      const text = script.textContent.trim();
      if (!text) continue;
      const data = JSON.parse(text);
      const found = findRecipe(data);
      if (found) return found;
    } catch (e) {}
  }
  return null;
}

function findRecipe(data) {
  if (!data) return null;
  if (Array.isArray(data)) {
    for (const item of data) { const r = findRecipe(item); if (r) return r; }
    return null;
  }
  if (typeof data !== 'object') return null;
  const type = data['@type'];
  const isRecipe = type === 'Recipe' || (Array.isArray(type) && type.includes('Recipe'));
  if (isRecipe) return data;
  if (data['@graph']) return findRecipe(data['@graph']);
  return null;
}

function normalizeRecipe(r, url) {
  let image = '';
  const img = r.image;
  if (typeof img === 'string') image = img;
  else if (Array.isArray(img) && img.length) {
    const first = img[0];
    image = typeof first === 'string' ? first : (first.url || '');
  } else if (img && typeof img === 'object') image = img.url || '';

  let instructions = [];
  const inst = r.recipeInstructions;
  if (Array.isArray(inst)) {
    for (const item of inst) {
      if (typeof item === 'string') instructions.push(item);
      else if (item && (item['@type'] === 'HowToStep' || item.text)) instructions.push(item.text || item.name || '');
      else if (item && item['@type'] === 'HowToSection' && Array.isArray(item.itemListElement)) {
        for (const sub of item.itemListElement) { if (sub && sub.text) instructions.push(sub.text); }
      }
    }
  } else if (typeof inst === 'string') {
    instructions = inst.split(/\n+/).filter(s => s.trim().length > 5);
  }
  instructions = instructions.map(s => String(s).replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim()).filter(Boolean);

  const ingredients = (r.recipeIngredient || r.ingredients || [])
    .map(s => String(s).replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim()).filter(Boolean);

  const fmtTime = (iso) => {
    if (!iso || typeof iso !== 'string') return '';
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
    if (!m) return '';
    const h = parseInt(m[1] || 0, 10);
    const min = parseInt(m[2] || 0, 10);
    if (h && min) return `${h}h ${min}m`;
    if (h) return `${h}h`;
    if (min) return `${min} min`;
    return '';
  };

  let description = (r.description || '').replace(/<[^>]+>/g, '').trim();
  if (description.length > 220) description = description.slice(0, 220).trim() + '…';

  let servings = '';
  if (r.recipeYield) {
    servings = Array.isArray(r.recipeYield) ? String(r.recipeYield[0]) : String(r.recipeYield);
    if (/^\d+$/.test(servings.trim())) servings = `${servings} servings`;
  }

  return {
    title: (r.name || 'Untitled Recipe').trim(),
    image, description,
    prepTime: fmtTime(r.prepTime),
    cookTime: fmtTime(r.cookTime) || fmtTime(r.totalTime),
    servings, ingredients, instructions,
    sourceUrl: url, savedAt: new Date().toISOString(),
  };
}

// ===================== AI simplification =====================
async function simplifyRecipe(recipe) {
  if (!state.apiKey) throw new Error('No API key set. Open Settings to add one.');
  const prompt = `Rewrite this recipe for a kitchen-side display. Goals: tighten verbose blog-style steps into clear action-focused sentences, remove preamble/marketing fluff, keep all critical timing and temperatures, and don't lose any ingredients. Return ONLY a single JSON object (no markdown, no commentary) with this schema:
{
  "title": "Concise dish name",
  "description": "1 short sentence",
  "ingredients": ["...full ingredient lines, lightly cleaned but otherwise unchanged..."],
  "instructions": ["...short action-focused steps, ideally 4-8 of them..."]
}

Recipe to rewrite:
Title: ${recipe.title}
Description: ${recipe.description || ''}
Ingredients:
${recipe.ingredients.join('\n')}

Instructions:
${recipe.instructions.join('\n')}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    if (res.status === 401) throw new Error('API key was rejected. Check it in Settings.');
    if (res.status === 429) throw new Error('Hit a rate limit. Try again in a minute.');
    throw new Error(`AI simplification failed (${res.status}). ${errText.slice(0, 100)}`);
  }
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('AI returned an unexpected format.');
  const cleaned = JSON.parse(match[0]);

  return {
    ...recipe,
    title: cleaned.title || recipe.title,
    description: cleaned.description || recipe.description,
    ingredients: Array.isArray(cleaned.ingredients) && cleaned.ingredients.length ? cleaned.ingredients : recipe.ingredients,
    instructions: Array.isArray(cleaned.instructions) && cleaned.instructions.length ? cleaned.instructions : recipe.instructions,
    simplified: true,
  };
}

// ===================== Render =====================
const app = document.getElementById('app');
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function render() {
  const week = getWeekDays(state.weekOffset);
  const today = dateKey(new Date());
  const todayDinner = state.meals[mealKey(today, 'dinner')];
  const todayLunch = state.meals[mealKey(today, 'lunch')];
  const featured = todayDinner || todayLunch;
  const featuredSlot = todayDinner ? 'dinner' : 'lunch';
  const weekStart = week[0];
  const weekEnd = week[6];
  const weekLabel = state.weekOffset === 0 ? 'This Week' :
                    state.weekOffset === 1 ? 'Next Week' :
                    state.weekOffset === -1 ? 'Last Week' :
                    `Week of ${fmtMonthDay(weekStart)}`;
  const showWelcome = Object.keys(state.meals).length === 0;

  app.innerHTML = `
    <header>
      <div class="brand">
        <span class="brand-mark">k</span>
        <div>
          <div class="brand-name">The Kitchen</div>
          <div class="brand-sub">a meal planner</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-icon" onclick="openSettings()" aria-label="Settings" title="Settings">⚙</button>
        <button class="btn" onclick="openShopping()">
          <span>🛒</span><span class="btn-text">Shopping</span>
        </button>
        <button class="btn btn-primary" onclick="openAdd('${today}', 'dinner')">
          <span>+</span><span class="btn-text">Add Recipe</span>
        </button>
      </div>
    </header>

    ${showWelcome ? renderWelcome(today) : renderTodayCard(today, featured, featuredSlot)}

    <div class="section-head">
      <h2>${escapeHtml(weekLabel)}</h2>
      <span class="sub">${fmtMonthDay(weekStart)} – ${fmtMonthDay(weekEnd)}</span>
      <div class="week-nav">
        <button class="btn btn-icon" onclick="navWeek(-1)" aria-label="Previous week">‹</button>
        <button class="btn btn-icon" onclick="navWeek(0)" aria-label="This week">●</button>
        <button class="btn btn-icon" onclick="navWeek(1)" aria-label="Next week">›</button>
      </div>
    </div>

    <div class="week-grid">
      ${week.map(d => renderDayCard(d, today)).join('')}
    </div>

    ${state.modal ? renderModal() : ''}
  `;
}

function renderWelcome(todayKey) {
  return `
    <div class="welcome">
      <h1>Welcome to The Kitchen</h1>
      <p>Plan the week, paste a recipe link, and the app pulls in the ingredients and steps. Tap any meal slot below to begin.</p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="openAdd('${todayKey}', 'dinner')">Add tonight's dinner</button>
        <button class="btn" onclick="openSettings()">Open Settings</button>
      </div>
    </div>
  `;
}

function renderTodayCard(todayKey, meal, slot) {
  const today = new Date();
  const dayName = fmtFullDay(today);
  const monthDay = fmtMonthDay(today);

  if (!meal) {
    return `
      <div class="today-card">
        <div class="today-empty">
          <div class="today-tag" style="justify-content:center;">Today · ${dayName}, ${monthDay}</div>
          <div class="today-title">Nothing planned yet</div>
          <p class="today-desc">Tap a slot to add lunch or dinner.</p>
          <div class="today-actions" style="justify-content:center;">
            <button class="btn btn-sage" onclick="openAdd('${todayKey}', 'lunch')">+ Add Lunch</button>
            <button class="btn btn-primary" onclick="openAdd('${todayKey}', 'dinner')">+ Add Dinner</button>
          </div>
        </div>
      </div>
    `;
  }

  const slotLabel = slot === 'lunch' ? 'Lunch' : 'Dinner';
  const imgStyle = meal.image ? `style="background-image:url('${escapeHtml(meal.image)}')"` : '';
  return `
    <div class="today-card">
      <div class="today-card-inner">
        <div class="today-image-wrap">
          <div class="today-image ${meal.image ? '' : 'today-image-empty'}" ${imgStyle}>
            ${meal.image ? '' : '<span>no photo</span>'}
          </div>
        </div>
        <div class="today-body">
          <div class="today-tag">★ Today's ${slotLabel} · ${dayName}</div>
          <h1 class="today-title">${escapeHtml(meal.title)}</h1>
          ${meal.description ? `<p class="today-desc">${escapeHtml(meal.description)}</p>` : ''}
          <div class="today-meta-bar">
            ${meal.prepTime ? `<div class="meta-pill"><div><div class="meta-label">Prep</div><div class="meta-value">${escapeHtml(meal.prepTime)}</div></div></div>` : ''}
            ${meal.cookTime ? `<div class="meta-pill"><div><div class="meta-label">Cook</div><div class="meta-value">${escapeHtml(meal.cookTime)}</div></div></div>` : ''}
            ${meal.servings ? `<div class="meta-pill"><div><div class="meta-label">Serves</div><div class="meta-value">${escapeHtml(meal.servings)}</div></div></div>` : ''}
          </div>
          <div class="today-actions">
            <button class="btn btn-primary" onclick="openRecipe('${todayKey}', '${slot}', true)">Cook Mode</button>
            <button class="btn" onclick="openRecipe('${todayKey}', '${slot}', false)">View Recipe</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderDayCard(d, todayKey) {
  const k = dateKey(d);
  const lunch = state.meals[mealKey(k, 'lunch')];
  const dinner = state.meals[mealKey(k, 'dinner')];
  const isToday = k === todayKey;
  const dayNum = d.getDate();
  const dayName = fmtDay(d);

  const slotHtml = (slot, label, meal) => {
    const onclick = meal ? `openRecipe('${k}', '${slot}', false)` : `openAdd('${k}', '${slot}')`;
    return `
      <div class="meal-slot meal-slot-${slot}" onclick="${onclick}">
        <div class="meal-slot-label">${label}</div>
        ${meal ? `
          ${meal.image ? `<div class="meal-slot-img" style="background-image:url('${escapeHtml(meal.image)}')"></div>` : ''}
          <div class="meal-slot-name">${escapeHtml(meal.title)}</div>
        ` : `<div class="meal-slot-empty">+</div>`}
      </div>
    `;
  };

  return `
    <div class="day-card ${isToday ? 'is-today' : ''}">
      <div class="day-header">
        <div class="day-name">${dayName}</div>
        <div class="day-date">${dayNum}</div>
      </div>
      ${slotHtml('lunch', 'Lunch', lunch)}
      ${slotHtml('dinner', 'Dinner', dinner)}
    </div>
  `;
}

function renderModal() {
  const m = state.modal;
  let inner;
  if (m.type === 'add') inner = renderAddPanel(m.date, m.slot);
  else if (m.type === 'recipe') inner = renderRecipePanel(m.date, m.slot, m.cookMode);
  else if (m.type === 'edit') inner = renderEditPanel(m.date, m.slot);
  else if (m.type === 'shopping') inner = renderShoppingPanel();
  else if (m.type === 'settings') inner = renderSettingsPanel();

  return `
    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal ${m.cookMode ? 'cook-mode' : ''}" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
        ${inner}
      </div>
    </div>
  `;
}

function renderAddPanel(date, slot) {
  const d = new Date(date + 'T00:00:00');
  const dayLabel = `${fmtFullDay(d)}, ${fmtMonthDay(d)}`;

  if (state.loading) {
    return `
      <div class="add-panel">
        <div class="loading-state">
          <div class="loader"></div>
          <div class="loading-state-text">${escapeHtml(state.loadingMsg || 'Working…')}</div>
          <div class="loading-sub">This usually takes 5–15 seconds</div>
        </div>
      </div>
    `;
  }

  if (state.manualMode) {
    return renderManualForm(date, slot, null, dayLabel);
  }

  const slotPicker = `
    <div class="meal-slot-picker">
      <button class="slot-pill ${slot === 'lunch' ? 'active' : ''}" onclick="switchSlot('${date}', 'lunch')">Lunch</button>
      <button class="slot-pill ${slot === 'dinner' ? 'active' : ''}" onclick="switchSlot('${date}', 'dinner')">Dinner</button>
    </div>
  `;

  return `
    <div class="add-panel">
      <h2>Plan a Meal</h2>
      <div class="subtitle">For ${escapeHtml(dayLabel)}</div>
      ${slotPicker}
      <div class="url-input-wrap">
        <input id="url-input" class="url-input" type="url"
          placeholder="Paste a recipe link…"
          autocapitalize="off" autocomplete="off" autocorrect="off"
          onkeydown="if(event.key==='Enter') submitUrl('${date}', '${slot}')" />
        <button class="btn btn-primary" onclick="submitUrl('${date}', '${slot}')">Fetch Recipe</button>
      </div>
      ${state.apiKey ? `
        <div style="font-family:var(--hand); font-size:16px; color:var(--sage-deep); margin-top:4px;">
          ✨ AI cleanup is on — recipes will be tightened up automatically
        </div>` : `
        <div style="font-family:var(--hand); font-size:16px; color:var(--brown-soft); margin-top:4px;">
          Tip: enable AI cleanup in <button class="btn btn-ghost" style="font-family:var(--hand); font-size:16px; padding:0; min-height:0; color:var(--peach-deep); text-decoration:underline;" onclick="openSettings()">Settings</button>
        </div>
      `}
      ${state.error ? `<div class="error-msg">${escapeHtml(state.error)}</div>` : ''}
      <div style="margin-top:12px;">
        <button class="btn btn-ghost" onclick="state.manualMode=true; render();" style="font-size:14px; color:var(--brown-soft);">
          or enter by hand →
        </button>
      </div>

      <div class="add-divider">— from your library —</div>
      ${state.library.length === 0 ? `
        <div class="library-empty">Saved recipes will live here for quick reuse.</div>
      ` : `
        <div class="library-grid">
          ${state.library.slice(0, 18).map((r, i) => `
            <div class="library-item" onclick="useFromLibrary(${i}, '${date}', '${slot}')">
              ${r.image
                ? `<div class="library-img" style="background-image:url('${escapeHtml(r.image)}')"></div>`
                : `<div class="library-img"></div>`}
              <div class="library-name">${escapeHtml(r.title)}</div>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;
}

function renderManualForm(date, slot, existing, dayLabel) {
  const r = existing || { title: '', image: '', description: '', prepTime: '', cookTime: '', servings: '', ingredients: [], instructions: [] };
  const isEdit = !!existing;
  return `
    <div class="add-panel">
      <h2>${isEdit ? 'Edit Recipe' : 'Add by Hand'}</h2>
      <div class="subtitle">${escapeHtml(dayLabel || '')}</div>
      <form class="manual-form" onsubmit="event.preventDefault(); submitManual('${date}', '${slot}', ${isEdit})">
        <label>Recipe name</label>
        <input id="m-title" placeholder="e.g. Lemon Chicken Pasta" required value="${escapeHtml(r.title)}" />
        <label>Image URL (optional)</label>
        <input id="m-image" placeholder="https://..." value="${escapeHtml(r.image)}" />
        <label>Description (optional)</label>
        <input id="m-desc" placeholder="Short summary" value="${escapeHtml(r.description)}" />
        <label>Prep / Cook / Servings</label>
        <div style="display:flex; gap:8px;">
          <input id="m-prep" placeholder="15 min" value="${escapeHtml(r.prepTime)}" />
          <input id="m-cook" placeholder="30 min" value="${escapeHtml(r.cookTime)}" />
          <input id="m-serv" placeholder="4 servings" value="${escapeHtml(r.servings)}" />
        </div>
        <label>Ingredients (one per line)</label>
        <textarea id="m-ing" placeholder="2 cups flour&#10;3 eggs">${escapeHtml((r.ingredients || []).join('\n'))}</textarea>
        <label>Instructions (one step per line)</label>
        <textarea id="m-ins" placeholder="Mix dry ingredients...&#10;Add wet...">${escapeHtml((r.instructions || []).join('\n'))}</textarea>
        <div style="display:flex; gap:8px; margin-top:24px; justify-content:center;">
          <button type="button" class="btn" onclick="cancelManual('${date}', '${slot}', ${isEdit})">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  `;
}

function renderEditPanel(date, slot) {
  const meal = state.meals[mealKey(date, slot)];
  if (!meal) return '<div class="add-panel"><h2>Recipe not found</h2></div>';
  const d = new Date(date + 'T00:00:00');
  return renderManualForm(date, slot, meal, `${fmtFullDay(d)}, ${fmtMonthDay(d)}`);
}

function renderRecipePanel(date, slot, cookMode) {
  const meal = state.meals[mealKey(date, slot)];
  if (!meal) return '<div class="add-panel"><h2>Recipe not found</h2></div>';
  const d = new Date(date + 'T00:00:00');
  const dayLabel = `${fmtFullDay(d)}, ${fmtMonthDay(d)}`;
  const slotLabel = slot === 'lunch' ? 'Lunch' : 'Dinner';
  const checkedKey = `checked:${date}:${slot}`;
  const checked = JSON.parse(Store.get(checkedKey) || '[]');
  const photoStyle = meal.image ? `style="background-image:url('${escapeHtml(meal.image)}')"` : '';

  return `
    <div class="recipe-page">
      <div class="recipe-page-title">
        <div class="recipe-day-tag">${escapeHtml(slotLabel)} · ${escapeHtml(dayLabel)}</div>
        <h1>${escapeHtml(meal.title)}</h1>
      </div>

      <div class="recipe-top-row">
        <div class="recipe-photo ${meal.image ? '' : 'recipe-photo-empty'}" ${photoStyle}>
          ${meal.image ? '' : 'no photo'}
        </div>
        <div class="recipe-stats">
          <div class="stat-row">
            <div class="stat-box"><span class="stat-label">Prep</span><span class="stat-value">${escapeHtml(meal.prepTime || '—')}</span></div>
            <div class="stat-box"><span class="stat-label">Cook</span><span class="stat-value">${escapeHtml(meal.cookTime || '—')}</span></div>
            <div class="stat-box"><span class="stat-label">Serves</span><span class="stat-value">${escapeHtml(meal.servings || '—')}</span></div>
          </div>
          ${meal.description ? `<div class="recipe-desc">"${escapeHtml(meal.description)}"</div>` : ''}
          <div style="display:flex; gap:8px; margin-top:auto;">
            <button class="btn ${cookMode ? 'btn-primary' : ''}" onclick="toggleCookMode('${date}', '${slot}')">
              ${cookMode ? '✓ Cook Mode' : '🔥 Cook Mode'}
            </button>
            <button class="btn" onclick="openEdit('${date}', '${slot}')">✎ Edit</button>
          </div>
        </div>
      </div>

      <div class="recipe-cols">
        <div>
          <h3 class="recipe-section-h">Ingredients</h3>
          <ul class="ingredient-list">
            ${meal.ingredients.map((ing, i) => `
              <li class="ingredient ${checked.includes(i) ? 'checked' : ''}" onclick="toggleIngredient('${date}', '${slot}', ${i})">
                <input type="checkbox" ${checked.includes(i) ? 'checked' : ''} onclick="event.stopPropagation();" onchange="toggleIngredient('${date}', '${slot}', ${i})" />
                <span>${escapeHtml(ing)}</span>
              </li>
            `).join('')}
          </ul>
        </div>
        <div class="recipe-divider"></div>
        <div>
          <h3 class="recipe-section-h">Directions</h3>
          <div class="step-list">
            ${meal.instructions.map((step, i) => `
              <div class="step">
                <div class="step-num">${i + 1}.</div>
                <div class="step-text">${escapeHtml(step)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="recipe-actions">
        ${meal.sourceUrl ? `<a href="${escapeHtml(meal.sourceUrl)}" target="_blank" rel="noopener">↗ Original</a>` : ''}
        <button class="btn" onclick="openAdd('${date}', '${slot}')">Replace</button>
        <button class="btn btn-danger" onclick="deleteMeal('${date}', '${slot}')">Remove from ${escapeHtml(slotLabel)}</button>
        ${meal.simplified ? `<span style="margin-left:auto; font-family:var(--hand); color:var(--sage-deep); font-size:17px;">✨ AI simplified</span>` : ''}
      </div>
    </div>
  `;
}

function renderShoppingPanel() {
  const week = getWeekDays(state.weekOffset);
  const items = [];
  week.forEach(d => {
    const k = dateKey(d);
    ['lunch', 'dinner'].forEach(slot => {
      const meal = state.meals[mealKey(k, slot)];
      if (meal && meal.ingredients && meal.ingredients.length) {
        items.push({ date: k, slot, day: fmtFullDay(d), meal });
      }
    });
  });

  return `
    <div class="recipe-page">
      <div class="recipe-page-title">
        <div class="recipe-day-tag">Shopping List</div>
        <h1>For the Week</h1>
      </div>
      ${items.length === 0 ? `
        <div style="text-align:center; padding:48px; color:var(--brown-faint); font-family:var(--hand); font-size:22px;">
          No meals planned this week yet.
        </div>
      ` : items.map(({ day, slot, meal, date }) => {
        const checkedKey = `shop:${date}:${slot}`;
        const checked = JSON.parse(Store.get(checkedKey) || '[]');
        const slotLabel = slot === 'lunch' ? 'Lunch' : 'Dinner';
        return `
          <div class="shopping-section">
            <div class="shopping-recipe-name">
              ${escapeHtml(meal.title)}
              <span class="shopping-day">${escapeHtml(day)} · ${escapeHtml(slotLabel)}</span>
            </div>
            <ul class="ingredient-list">
              ${meal.ingredients.map((ing, i) => `
                <li class="ingredient ${checked.includes(i) ? 'checked' : ''}" onclick="toggleShop('${date}', '${slot}', ${i})">
                  <input type="checkbox" ${checked.includes(i) ? 'checked' : ''} onclick="event.stopPropagation();" onchange="toggleShop('${date}', '${slot}', ${i})" />
                  <span>${escapeHtml(ing)}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderSettingsPanel() {
  const hasKey = !!state.apiKey;
  const masked = hasKey ? state.apiKey.slice(0, 10) + '…' + state.apiKey.slice(-4) : '';
  return `
    <div class="settings-panel">
      <h2>Settings</h2>

      <div class="settings-row">
        <div class="settings-label">✨ AI Recipe Cleanup</div>
        <p class="settings-help">
          When enabled, recipes get rewritten by Claude (the AI) into shorter, kitchen-friendly steps before saving.
          Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> →
          add ~$5 of credits → API Keys → Create Key. Keep the key private; it never leaves this iPad.
        </p>
        <input class="key-input" id="api-key-input" type="password"
          placeholder="${hasKey ? masked : 'Paste your sk-ant-… key here'}"
          autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <div style="margin-top:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="saveApiKey()">Save Key</button>
          ${hasKey ? `<button class="btn btn-danger" onclick="clearApiKey()">Remove Key</button>` : ''}
          <span class="key-status ${hasKey ? 'ok' : 'missing'}">
            ${hasKey ? '✓ Key set — AI cleanup is on' : '○ No key — recipes save as-is'}
          </span>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-label">📋 Export / Backup</div>
        <p class="settings-help">
          All your meals and recipes live only on this iPad's Safari storage. To back up, copy the data below into a note.
        </p>
        <button class="btn" onclick="exportData()">Show backup data</button>
      </div>

      <div class="settings-row">
        <div class="settings-label">🗑 Reset</div>
        <p class="settings-help">Clear all planned meals and the recipe library. This cannot be undone.</p>
        <button class="btn btn-danger" onclick="resetAll()">Clear everything</button>
      </div>
    </div>
  `;
}

// ===================== Actions =====================
window.navWeek = (delta) => { if (delta === 0) state.weekOffset = 0; else state.weekOffset += delta; render(); };
window.openAdd = (date, slot) => {
  state.modal = { type: 'add', date, slot: slot || 'dinner' };
  state.error = null; state.manualMode = false;
  render();
  setTimeout(() => { const i = document.getElementById('url-input'); if (i) i.focus(); }, 50);
};
window.switchSlot = (date, slot) => { state.modal = { ...state.modal, slot }; render(); };
window.openRecipe = (date, slot, cookMode) => { state.modal = { type: 'recipe', date, slot, cookMode: !!cookMode }; render(); };
window.openEdit = (date, slot) => { state.modal = { type: 'edit', date, slot }; render(); };
window.openShopping = () => { state.modal = { type: 'shopping' }; render(); };
window.openSettings = () => { state.modal = { type: 'settings' }; render(); };
window.closeModal = () => { state.modal = null; state.error = null; state.manualMode = false; render(); };
window.toggleCookMode = (date, slot) => { state.modal = { type: 'recipe', date, slot, cookMode: !state.modal.cookMode }; render(); };

window.submitUrl = async (date, slot) => {
  const input = document.getElementById('url-input');
  const url = (input && input.value || '').trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) {
    state.error = 'Please paste a full link starting with https://';
    render(); return;
  }
  state.loading = true; state.error = null;
  state.loadingMsg = 'Reading the recipe…';
  render();
  try {
    const html = await fetchRecipeHtml(url);
    state.loadingMsg = 'Extracting ingredients…';
    render();
    const raw = extractRecipeFromHtml(html);
    if (!raw) throw new Error("This site doesn't have a structured recipe. Try entering it by hand.");
    let recipe = normalizeRecipe(raw, url);

    if (state.apiKey) {
      try {
        state.loadingMsg = 'AI is tightening it up…';
        render();
        recipe = await simplifyRecipe(recipe);
      } catch (aiErr) {
        // AI failed — keep original recipe and show a soft message
        console.warn('AI simplify failed:', aiErr);
        state.error = `Saved without AI cleanup: ${aiErr.message}`;
      }
    }

    saveMeal(date, slot, recipe);
    state.loading = false;
    state.modal = { type: 'recipe', date, slot, cookMode: false };
    render();
  } catch (e) {
    state.loading = false;
    state.error = (e && e.message) || 'Could not read that recipe.';
    render();
  }
};

window.submitManual = (date, slot, isEdit) => {
  const v = (id) => (document.getElementById(id) || {}).value || '';
  const existing = isEdit ? state.meals[mealKey(date, slot)] : null;
  const recipe = {
    title: v('m-title').trim() || 'Untitled',
    image: v('m-image').trim(),
    description: v('m-desc').trim(),
    prepTime: v('m-prep').trim(),
    cookTime: v('m-cook').trim(),
    servings: v('m-serv').trim(),
    ingredients: v('m-ing').split('\n').map(s => s.trim()).filter(Boolean),
    instructions: v('m-ins').split('\n').map(s => s.trim()).filter(Boolean),
    sourceUrl: existing?.sourceUrl || '',
    savedAt: existing?.savedAt || new Date().toISOString(),
    simplified: existing?.simplified || false,
  };
  if (isEdit) updateMeal(date, slot, recipe);
  else saveMeal(date, slot, recipe);
  state.manualMode = false;
  state.modal = { type: 'recipe', date, slot, cookMode: false };
  render();
};

window.cancelManual = (date, slot, isEdit) => {
  if (isEdit) state.modal = { type: 'recipe', date, slot, cookMode: false };
  else { state.manualMode = false; state.modal = { type: 'add', date, slot }; }
  render();
};

window.useFromLibrary = (idx, date, slot) => {
  const recipe = { ...state.library[idx] };
  saveMeal(date, slot, recipe);
  state.modal = { type: 'recipe', date, slot, cookMode: false };
  render();
};

window.deleteMeal = (date, slot) => {
  if (!confirm('Remove this recipe?')) return;
  removeMeal(date, slot);
  state.modal = null;
  render();
};

window.toggleIngredient = (date, slot, i) => {
  const key = `checked:${date}:${slot}`;
  const checked = JSON.parse(Store.get(key) || '[]');
  const idx = checked.indexOf(i);
  if (idx >= 0) checked.splice(idx, 1); else checked.push(i);
  Store.set(key, JSON.stringify(checked));
  render();
};

window.toggleShop = (date, slot, i) => {
  const key = `shop:${date}:${slot}`;
  const checked = JSON.parse(Store.get(key) || '[]');
  const idx = checked.indexOf(i);
  if (idx >= 0) checked.splice(idx, 1); else checked.push(i);
  Store.set(key, JSON.stringify(checked));
  render();
};

window.saveApiKey = () => {
  const input = document.getElementById('api-key-input');
  const val = (input && input.value || '').trim();
  if (!val) return;
  if (!val.startsWith('sk-ant-')) {
    alert("That doesn't look like an Anthropic key — they start with 'sk-ant-'. Double-check at console.anthropic.com.");
    return;
  }
  setApiKey(val);
  render();
};

window.clearApiKey = () => {
  if (!confirm('Remove the API key? AI cleanup will be turned off.')) return;
  setApiKey('');
  render();
};

window.exportData = () => {
  const out = { meals: {}, library: state.library, exportedAt: new Date().toISOString() };
  for (const k of Store.keys('meal:')) out.meals[k.replace('meal:', '')] = JSON.parse(Store.get(k));
  const text = JSON.stringify(out, null, 2);
  prompt('Copy this backup data and save it somewhere safe (Notes, email, etc.):', text);
};

window.resetAll = () => {
  if (!confirm('Delete all planned meals and saved recipes? This cannot be undone.')) return;
  if (!confirm('Are you absolutely sure?')) return;
  for (const k of Store.keys('meal:')) Store.del(k);
  for (const k of Store.keys('checked:')) Store.del(k);
  for (const k of Store.keys('shop:')) Store.del(k);
  Store.del('library');
  state.meals = {}; state.library = []; state.modal = null;
  render();
};

// ===================== Init =====================
loadState();
render();
</script>
</body>
</html>
